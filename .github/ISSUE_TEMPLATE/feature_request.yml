name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Code of Conduct in this repository
          required: true
  - type: checkboxes
    id: search
    attributes:
      label: Existing issues
      options:
        - label: I searched existing issues and this has not been requested yet
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Investor discovery
        - Deck generation
        - Refresh workflow
        - Tracker and follow-ups
        - Documentation
        - Other
    validations:
      required: true
