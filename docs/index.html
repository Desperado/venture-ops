<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=./30-sec-demo.html">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Venture-Ops Demo</title>
  <style>
    :root {
      --bg: #071119;
      --panel: #0e1a24;
      --line: #234051;
      --text: #eef5f9;
      --muted: #9cb2bf;
      --blue: #4da5ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #061019 0%, #040a10 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 760px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 28px;
      text-align: left;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1.02;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.5;
    }
    a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening the Venture-Ops demo...</h1>
    <p>If you are not redirected automatically, open the 30-second walkthrough here:</p>
    <p><a href="./30-sec-demo.html">Open the Venture-Ops 30-second demo</a></p>
  </main>
</body>
</html>
